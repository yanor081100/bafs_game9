<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港DSE會計挑戰：獨資財務狀況表基本功</title>
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #319795;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --success-color: #38a169;
            --error-color: #e53e3e;
        }

        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 30px;
        }

        header {
            text-align: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary-color);
            font-size: 26px;
            margin-bottom: 5px;
        }

        header p {
            color: #718096;
            font-size: 14px;
        }

        .game-setup {
            text-align: center;
            padding: 40px 20px;
        }

        .level-select {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }

        .btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: #2f855a; }

        .game-panel {
            display: none;
        }

        .case-info {
            background: #edf2f7;
            padding: 15px;
            border-left: 5px solid var(--accent-color);
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .case-info h3 {
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #2d3748;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .game-content {
            display: flex;
            gap: 25px;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            .game-content { flex-direction: column; }
        }

        .question-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fff;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            padding: 30px;
            min-height: 250px;
        }

        .account-card {
            background: linear-gradient(135deg, #63b3ed, #4299e1);
            color: white;
            padding: 20px 40px;
            border-radius: 8px;
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            box-shadow: 0 4px 10px rgba(66, 153, 225, 0.3);
            margin-bottom: 20px;
            animation: popIn 0.3s ease;
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .category-zone {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-btn {
            background-color: #fff;
            color: var(--primary-color);
            border: 2px solid var(--secondary-color);
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-btn:hover {
            background-color: #ebf8ff;
            transform: translateX(5px);
        }

        .category-btn span.badge {
            background-color: #edf2f7;
            color: #4a5568;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
        }

        .feedback-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .feedback-modal {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            0% { transform: translateY(-50px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .feedback-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .feedback-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .feedback-msg {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .report-zone {
            display: none;
        }

        /* 財務狀況表專用標準會計樣式 */
        .sofp-box {
            background: #fff;
            border: 2px solid #2d3748;
            padding: 25px;
            margin: 20px 0;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .sofp-header {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .sofp-header .comp-name { font-size: 20px; color: var(--primary-color); }
        .sofp-header .doc-title { font-size: 18px; text-transform: uppercase; }
        .sofp-header .doc-date { font-size: 14px; color: #4a5568; font-style: italic; }

        .sofp-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
        }

        .sofp-table td {
            padding: 6px 10px;
            vertical-align: bottom;
        }

        .sofp-section-title {
            font-weight: bold;
            color: var(--primary-color);
            padding-top: 15px !important;
            font-size: 16px;
            text-decoration: underline;
        }

        .sofp-subitem {
            padding-left: 30px !important;
        }

        .num-col {
            text-align: right;
            width: 120px;
        }

        .subtotal-line {
            border-top: 1px solid #2d3748;
        }

        .total-line {
            border-top: 1px solid #2d3748;
            border-bottom: 4px double #2d3748; /* DSE會計標準雙底線 */
            font-weight: bold;
            background-color: #edf2f7;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>💼 香港DSE會計挑戰賽：獨資財務狀況表</h1>
        <p>專業商業模擬系列 • 適合初學者輕鬆掌握基礎帳戶分類</p>
    </header>

    <div id="setup-page" class="game-setup">
        <h2>歡迎來到會計基礎培訓計劃</h2>
        <p style="margin-top: 10px; color: #4a5568;">所有個案均為獨資企業。請選擇你要挑戰的個案，幫東主將年終賬目分類：</p>
        <div class="level-select">
            <button class="btn" onclick="startGame('easy')">🟢 初級個案：小新陀螺店 (基礎零售)</button>
            <button class="btn" style="background-color: #dd6b20;" onclick="startGame('medium')">🟠 中級個案：大雄洗衣店 (服務業賬目)</button>
            <button class="btn" style="background-color: #e53e3e;" onclick="startGame('hard')">🔴 高級個案：阿明文具店 (綜合基礎練習)</button>
        </div>
    </div>

    <div id="game-page" class="game-panel">
        <div id="case-header" class="case-info">
            </div>

        <div class="status-bar">
            <span id="current-case-name">個案：加載中</span>
            <span id="score-display">得分：0</span>
            <span id="progress-display">進度：0 / 0</span>
        </div>

        <div class="game-content">
            <div class="question-zone">
                <p style="color: #718096; font-size: 14px; margin-bottom: 10px;">請將以下帳戶項目歸類到右側正確的類別：</p>
                <div id="account-box" class="account-card">帳戶項目</div>
                <div id="account-detail" style="color: #4a5568; font-size: 14px; text-align: center;">金額</div>
            </div>

            <div class="category-zone">
                <button class="category-btn" onclick="submitAnswer('非流動資產')">
                    📁 非流動資產 (Non-current assets) <span class="badge">長期使用</span>
                </button>
                <button class="category-btn" onclick="submitAnswer('流動資產')">
                    💵 流動資產 (Current assets) <span class="badge">1年內變現</span>
                </button>
                <button class="category-btn" onclick="submitAnswer('資本的計算')">
                    ⚖️ 資本的計算 (Calculation of Capital) <span class="badge">東主權益</span>
                </button>
                <button class="category-btn" onclick="submitAnswer('非流動負債')">
                    ⏳ 非流動負債 (Non-current liabilities) <span class="badge">超過1年還款</span>
                </button>
                <button class="category-btn" onclick="submitAnswer('流動負債')">
                    🏪 流動負債 (Current liabilities) <span class="badge">1年內清還</span>
                </button>
            </div>
        </div>
    </div>

    <div id="report-page" class="report-zone">
        <h2 style="color: var(--primary-color); text-align: center;">📊 挑戰完成！</h2>
        <div id="final-summary" style="margin: 15px 0; font-size: 18px; text-align: center; font-weight: bold;"></div>
        
        <div class="sofp-box">
            <div class="sofp-header">
                <div id="sofp-comp" class="comp-name">公司名稱</div>
                <div class="doc-title">財務狀況表</div>
                <div class="doc-date">202X年12月31日</div>
            </div>
            <table class="sofp-table">
                <tbody id="sofp-tbody">
                    </tbody>
            </table>
        </div>
        
        <div style="text-align: center; margin-top: 30px;">
            <button class="btn btn-success" onclick="resetGame()">🔄 挑戰其他個案 / 重新開始</button>
        </div>
    </div>
</div>

<div id="feedback-pop" class="feedback-overlay">
    <div class="feedback-modal">
        <div id="fb-icon" class="feedback-icon">🎉</div>
        <div id="fb-title" class="feedback-title">非常出色！</div>
        <div id="fb-msg" class="feedback-msg">回饋內文</div>
        <button id="fb-btn" class="btn" onclick="closeFeedback()">繼續下一題</button>
    </div>
</div>

<script>
// 經過精確數學配對的會計數據（保證：資產總額 = 資本 + 非流動負債 + 流動負債）
const gameData = {
    easy: {
        titleName: "小新陀螺店",
        caseName: "小新陀螺店 (初級個案)",
        desc: "東主小新獨資經營的零售店。請協助小新把年終結算日的賬目正確歸類，以編製基本財務狀況表。",
        items: [
            { name: "汽車", val: 100000, cat: "非流動資產", info: "經營業務使用的送貨車輛，屬於非流動資產。" },
            { name: "設備", val: 80000, cat: "非流動資產", info: "店內使用的電腦系統及陳列櫃，屬非流動資產。" },
            { name: "存貨", val: 30000, cat: "流動資產", info: "未售出的玩具及陀螺，屬於流動資產。" },
            { name: "應收貨款", val: 12000, cat: "流動資產", info: "客戶賒賬購買商品而欠本店的款項，屬流動資產。" },
            { name: "現金", val: 6000, cat: "流動資產", info: "店內保險箱的現鈔及銀行存款，是流動資產。" },
            { name: "期初資本", val: 30000, cat: "資本的計算", info: "期初資本，是獨資東主投入業務的初始權益。" },
            { name: "加：淨利潤", val: 100000, cat: "資本的計算", info: "本年度經營所得的淨利潤，會令資本增加。" },
            { name: "減：提用", val: 2000, cat: "資本的計算", info: "東主從公司提取作個人用途的款項，會使總資本減少。" },
            { name: "銀行貸款 (3年期)", val: 50000, cat: "非流動負債", info: "還款期超過一年的長期借款，屬於非流動負債。" },
            { name: "短期貸款", val: 30000, cat: "流動負債", info: "還款期在一年之內的短期借貸，屬於流動負債。" },
            { name: "應付貨款", val: 20000, cat: "流動負債", info: "因向供應商賒購貨品而欠對方的貨款，屬於流動負債。" }
        ]
    },
    medium: {
        titleName: "大雄洗衣店",
        caseName: "大雄洗衣店 (中級個案)",
        desc: "東主大雄獨資經營的洗衣店。本關卡包含「淨虧損」，考驗同學能否正確計算期末資本並完成平衡！",
        items: [
            { name: "物業", val: 500000, cat: "非流動資產", info: "大雄自置的洗衣店舖，屬於長期持有的非流動資產。" },
            { name: "洗衣設備", val: 160000, cat: "非流動資產", info: "店內的專業洗衣機及烘乾機，屬非流動資產。" },
            { name: "銀行存款", val: 45000, cat: "流動資產", info: "存放在銀行商業戶口內的營運資金，屬於流動資產。" },
            { name: "應收貨款", val: 5000, cat: "流動資產", info: "大客戶賒賬欠本公司的款項，屬於流動資產。" },
            { name: "期初資本", val: 560000, cat: "資本的計算", info: "期初資本，是東主最初投入這家洗衣店的資金。" },
            { name: "減：淨虧損", val: 12000, cat: "資本的計算", info: "本年度經營出現虧損，會導致東主權益減少（減項）。" },
            { name: "減：提用", val: 3000, cat: "資本的計算", info: "大雄拿走店內現金作私人用途，會使東主總資本減少。" },
            { name: "銀行長期貸款 (5年期)", val: 150000, cat: "非流動負債", info: "長期借款，屬於非流動負債。" },
            { name: "應付貨款", val: 15000, cat: "流動負債", info: "因購買洗衣物資而欠供應商的貨款，屬於流動負債。" }
        ]
    },
    hard: {
        titleName: "阿明文具店",
        caseName: "阿明文具店 (高級個案)",
        desc: "東主阿明獨資經營的社區文具店。本關卡將所有基礎項目隨機混合，考驗學生的基本功是否紮實！",
        items: [
            { name: "辦公室家具", val: 25000, cat: "非流動資產", info: "文具店內的收銀櫃枱、陳列貨架，屬於非流動資產。" },
            { name: "店舖裝修", val: 40000, cat: "非流動資產", info: "店舖的硬裝裝修，會為店舖帶來多年的營運環境，屬於非流動資產。" },
            { name: "文具存貨", val: 22000, cat: "流動資產", info: "店內準備賣給學生的筆和筆記本，屬於流動資產。" },
            { name: "現金", val: 4000, cat: "流動資產", info: "收銀機內的輔幣與鈔票，是流動資產。" },
            { name: "期初資本", val: 50000, cat: "資本的計算", info: "阿明投入文具店的期初資本。" },
            { name: "加：淨利潤", val: 32000, cat: "資本的計算", info: "賺到的利潤屬於東主，會在資本中加進去。" },
            { name: "減：提用", val: 1000, cat: "資本的計算", info: "東主阿明拿了店裏的文具給自己孩子用，屬於提用。" },
            { name: "長期借款 (2年期)", val: 5000, cat: "非流動負債", info: "還款期為2年的借款，超過一年，故屬非流動負債。" },
            { name: "應付貨款", val: 5000, cat: "流動負債", info: "欠文具批發商的貨款，屬於流動負債。" }
        ]
    }
};

let currentLevel = '';
let currentItems = [];
let currentItemIndex = 0;
let score = 0;

function startGame(level) {
    currentLevel = level;
    currentItems = [...gameData[level].items];
    currentItems.sort(() => Math.random() - 0.5);
    currentItemIndex = 0;
    score = 0;

    document.getElementById('setup-page').style.display = 'none';
    document.getElementById('game-page').style.display = 'block';
    document.getElementById('report-page').style.display = 'none';

    document.getElementById('case-header').innerHTML = `
        <h3>🏢 正在審查：${gameData[level].caseName}</h3>
        <p>${gameData[level].desc}</p>
    `;
    document.getElementById('current-case-name').innerText = `個案：${gameData[level].caseName}`;
    
    updateStatusBar();
    showNextItem();
}

function updateStatusBar() {
    document.getElementById('score-display').innerText = `得分：${score}`;
    document.getElementById('progress-display').innerText = `進度：${currentItemIndex} / ${currentItems.length}`;
}

function showNextItem() {
    if (currentItemIndex >= currentItems.length) {
        endGame();
        return;
    }
    let item = currentItems[currentItemIndex];
    let displayName = item.name.replace("加：", "").replace("減：", "");
    document.getElementById('account-box').innerText = displayName;
    document.getElementById('account-detail').innerText = `賬目金額：$${item.val.toLocaleString()}`;
    updateStatusBar();
}

function submitAnswer(chosenCategory) {
    let item = currentItems[currentItemIndex];
    let isCorrect = (chosenCategory === item.cat);
    
    let popIcon = document.getElementById('fb-icon');
    let popTitle = document.getElementById('fb-title');
    let popMsg = document.getElementById('fb-msg');

    if (isCorrect) {
        score += 10;
        popIcon.innerText = "🌟";
        popTitle.innerText = "答對了！非常專業！";
        popTitle.style.color = "var(--success-color)";
    } else {
        popIcon.innerText = "❌";
        popTitle.innerText = `分類出錯！正確應為：【${item.cat}】`;
        popTitle.style.color = "var(--error-color)";
    }
    
    popMsg.innerHTML = `
        <strong>帳戶項目：</strong>${item.name.replace("加：","").replace("減：","")} ($${item.val.toLocaleString()})<br>
        <strong>DSE 會計概念：</strong>${item.info}
    `;
    
    document.getElementById('feedback-pop').style.display = 'flex';
}

function closeFeedback() {
    document.getElementById('feedback-pop').style.display = 'none';
    currentItemIndex++;
    showNextItem();
}

function endGame() {
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('report-page').style.display = 'block';

    let maxScore = currentItems.length * 10;
    document.getElementById('final-summary').innerHTML = `
        您的最終得分：<span style="color:var(--success-color); font-size:24px;">${score}</span> / ${maxScore} 分
    `;

    generateSOFP();
}

// 核心會計邏輯：自動動態編製 DSE 格式的財務狀況表 (完美平衡版)
function generateSOFP() {
    const data = gameData[currentLevel];
    document.getElementById('sofp-comp').innerText = data.titleName;

    let nca = data.items.filter(i => i.cat === "非流動資產");
    let ca = data.items.filter(i => i.cat === "流動資產");
    let cl = data.items.filter(i => i.cat === "流動負債");
    let ncl = data.items.filter(i => i.cat === "非流動負債");
    
    let openingCapital = data.items.find(i => i.name === "期初資本");
    let netProfit = data.items.find(i => i.name === "加：淨利潤");
    let netLoss = data.items.find(i => i.name === "減：淨虧損");
    let drawings = data.items.find(i => i.name === "減：提用");

    let totalNCA = nca.reduce((sum, i) => sum + i.val, 0);
    let totalCA = ca.reduce((sum, i) => sum + i.val, 0);
    let totalCL = cl.reduce((sum, i) => sum + i.val, 0);
    let totalNCL = ncl.reduce((sum, i) => sum + i.val, 0);
    
    // 計算：資產總額
    let totalAssets = totalNCA + totalCA;

    // 計算：期末資本
    let closingCapital = openingCapital.val;
    if(netProfit) closingCapital += netProfit.val;
    if(netLoss) closingCapital -= netLoss.val;
    if(drawings) closingCapital -= drawings.val;

    // 計算：資本及負債總額 (Capital + Non-current Liabilities + Current Liabilities)
    let totalCapitalAndLiabilities = closingCapital + totalNCL + totalCL;

    let html = "";

    // ==================== 上半部：資產 (Assets) ====================
    html += `<tr><td class="sofp-section-title">非流動資產</td><td></td><td></td></tr>`;
    nca.forEach(i => {
        html += `<tr><td class="sofp-subitem">${i.name}</td><td class="num-col">$ ${i.val.toLocaleString()}</td><td></td></tr>`;
    });
    html += `<tr><td></td><td></td><td class="num-col subtotal-line">$ ${totalNCA.toLocaleString()}</td></tr>`;

    html += `<tr><td class="sofp-section-title">流動資產</td><td></td><td></td></tr>`;
    ca.forEach(i => {
        html += `<tr><td class="sofp-subitem">${i.name}</td><td class="num-col">$ ${i.val.toLocaleString()}</td><td></td></tr>`;
    });
    html += `<tr><td></td><td></td><td class="num-col subtotal-line">${totalCA.toLocaleString()}</td></tr>`;

    // 🌟 資產總額 🌟
    html += `<tr><td style="font-weight:bold; padding-top:10px; color:#2b6cb0; font-size:16px;">資產總額</td><td></td><td class="num-col total-line" style="color:#2b6cb0; font-size:16px;">$ ${totalAssets.toLocaleString()}</td></tr>`;

    // 視覺分隔行
    html += `<tr><td colspan="3" style="height:25px; border-bottom: 1px dashed #cbd5e0;"></td></tr>`;
    html += `<tr><td colspan="3" style="height:15px;"></td></tr>`;

    // ==================== 下半部：資本及負債 (Capital and Liabilities) ====================
    html += `<tr><td class="sofp-section-title">東主權益（資本）</td><td></td><td></td></tr>`;
    html += `<tr><td class="sofp-subitem">期初資本</td><td class="num-col">$ ${openingCapital.val.toLocaleString()}</td><td></td></tr>`;
    if(netProfit) {
        html += `<tr><td class="sofp-subitem">加：淨利潤</td><td class="num-col">${netProfit.val.toLocaleString()}</td><td></td></tr>`;
    }
    if(netLoss) {
        html += `<tr><td class="sofp-subitem">減：淨虧損</td><td class="num-col">(${netLoss.val.toLocaleString()})</td><td></td></tr>`;
    }
    html += `<tr><td></td><td class="num-col subtotal-line">${(openingCapital.val + (netProfit?netProfit.val:0) - (netLoss?netLoss.val:0)).toLocaleString()}</td><td></td></tr>`;
    if(drawings) {
        html += `<tr><td class="sofp-subitem">減：提用</td><td class="num-col">(${drawings.val.toLocaleString()})</td><td></td></tr>`;
    }
    html += `<tr><td class="sofp-subitem" style="font-weight:bold;">期末資本</td><td></td><td class="num-col subtotal-line">$ ${closingCapital.toLocaleString()}</td></tr>`;

    if(ncl.length > 0) {
        html += `<tr><td class="sofp-section-title">非流動負債</td><td></td><td></td></tr>`;
        ncl.forEach(i => {
            html += `<tr><td class="sofp-subitem">${i.name}</td><td class="num-col">$ ${i.val.toLocaleString()}</td><td></td></tr>`;
        });
        html += `<tr><td></td><td></td><td class="num-col subtotal-line">${totalNCL.toLocaleString()}</td></tr>`;
    }

    if(cl.length > 0) {
        html += `<tr><td class="sofp-section-title">流動負債</td><td></td><td></td></tr>`;
        cl.forEach(i => {
            html += `<tr><td class="sofp-subitem">${i.name}</td><td class="num-col">$ ${i.val.toLocaleString()}</td><td></td></tr>`;
        });
        html += `<tr><td></td><td></td><td class="num-col subtotal-line">${totalCL.toLocaleString()}</td></tr>`;
    }

    // 🌟 資本及負債總額 🌟
    html += `<tr><td style="font-weight:bold; padding-top:10px; color:#2b6cb0; font-size:16px;">資本及負債總額</td><td></td><td class="num-col total-line" style="color:#2b6cb0; font-size:16px;">$ ${totalCapitalAndLiabilities.toLocaleString()}</td></tr>`;

    document.getElementById('sofp-tbody').innerHTML = html;
}

function resetGame() {
    document.getElementById('setup-page').style.display = 'block';
    document.getElementById('game-page').style.display = 'none';
    document.getElementById('report-page').style.display = 'none';
}
</script>
</body>
</html>
